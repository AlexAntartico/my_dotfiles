# ── Prefix: Ctrl+Space ────────────────────────────────────
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# ── Core behavior ─────────────────────────────────────────
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -g escape-time 0
set -g focus-events on
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# ── Splits (same dir) ─────────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ── Vim-style pane navigation ─────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ── Pane resize ───────────────────────────────────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Session management ────────────────────────────────────
bind S command-prompt "new-session -s '%%'"
bind s choose-tree -sZ

# ── Copy mode (Vim-style) ─────────────────────────────────
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi y   send -X copy-pipe-and-cancel "xclip -sel clip"
bind -T copy-mode-vi Escape send -X cancel

# ── Reload config ─────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# ── Status bar (Nord) ─────────────────────────────────────
set -g status-position bottom
set -g status-style "bg=#2E3440,fg=#D8DEE9"
set -g status-left-length 40
set -g status-left "#[bg=#81A1C1,fg=#2E3440,bold] #S #[bg=#2E3440,fg=#81A1C1] "
set -g status-right "#[fg=#B48EAD]%H:%M #[fg=#D8DEE9]%d-%b"
set -g window-status-format "#[fg=#4C566A] #I:#W "
set -g window-status-current-format "#[bg=#3B4252,fg=#81A1C1,bold] #I:#W "
set -g window-status-separator ""

# ── Plugins (TPM) ─────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

set -g default-shell /usr/bin/zsh

run '~/.tmux/plugins/tpm/tpm'
